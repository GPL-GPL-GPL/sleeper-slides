<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleeper Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span class="dot"></span> Sleeper Slides</div>
  <div class="topbar-actions">
    <div class="mode-indicator" id="modeIndicator">EDIT</div>
    <button class="btn" id="undoBtn" title="Undo (Ctrl+Z)">↩ Undo</button>
    <button class="btn" id="redoBtn" title="Redo (Ctrl+Y)">↪ Redo</button>
    <button class="btn" id="exportPdfBtn" title="Export as PDF">↓ PDF</button>
    <button class="btn" id="addSlideBtn">+ Slide</button>
    <button class="btn sleeper" id="addSleeperBtn">+ Sleeper</button>
    <button class="btn primary" id="presentBtn">Present</button>
  </div>
</div>

<!-- ELEMENT TOOLBAR -->
<div class="element-toolbar" id="elementToolbar">
  <button class="tool-btn" id="gridToggleBtn" title="Toggle gridlines (G)">⊞ Grid</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="addTextBtn" title="Add text box">T Text</button>
  <button class="tool-btn" id="addRectBtn" title="Add rectangle">▭ Rect</button>
  <button class="tool-btn" id="addCircleBtn" title="Add circle">◯ Circle</button>
  <button class="tool-btn" id="addImageBtn" title="Import image">⬜ Image</button>
  <button class="tool-btn" id="addVideoBtn" title="Import video">▶ Video</button>
  <div class="tool-sep"></div>
  <span class="tool-hint">Select + <kbd>Del</kbd> remove · <kbd>Ctrl+Z</kbd> undo · <kbd>Ctrl+C/V</kbd> copy/paste</span>
</div>

<!-- FORMAT BAR -->
<div class="format-bar" id="formatBar"></div>

<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main Queue</div>
    </div>
    <div class="slide-list" id="mainSlideList"></div>
    <div class="sidebar-section" style="border-bottom:none;">
      <div class="sidebar-label">
        Sleeper Queue
        <span class="hidden-tag">HIDDEN</span>
      </div>
    </div>
    <div class="slide-list" id="sleeperSlideList"></div>
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <div class="slide-canvas" id="slideCanvas">
      <div class="slide-content" id="slideContent"></div>
    </div>
    <!-- NOTES PANEL -->
    <div class="notes-panel" id="notesPanel" style="display:none">
      <div class="notes-label">Speaker Notes</div>
      <textarea class="notes-textarea" id="notesTextarea" placeholder="Add speaker notes for this slide…"></textarea>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn">←</button>
    <span class="slide-counter" id="slideCounter">0 / 0</span>
    <button class="nav-btn" id="nextBtn">→</button>
  </div>
  <div class="bottom-center">
    <button class="tool-btn" id="notesToggleBtn" title="Toggle speaker notes">🗒 Notes</button>
  </div>
  <div class="code-input-area">
    <label for="codeInput">Code</label>
    <input class="code-input" id="codeInput" placeholder="···" maxlength="6" spellcheck="false">
    <button class="return-btn" id="returnBtn">↩ Return</button>
  </div>
</div>

<!-- ADD SLIDE MODAL -->
<div class="modal-overlay" id="addSlideModal">
  <div class="modal">
    <h3 id="modalTitle">Add Slide</h3>
    <div class="field">
      <label for="newSlideTitle">Title</label>
      <input id="newSlideTitle" placeholder="Slide title…">
    </div>
    <div class="field">
      <label for="newSlideBody">Body</label>
      <textarea id="newSlideBody" placeholder="Slide content…"></textarea>
    </div>
    <div class="toggle-row" id="sleeperToggleRow">
      <span>Sleeper Slide</span>
      <div class="toggle" id="sleeperToggle"></div>
    </div>
    <div class="field" id="codeField" style="display:none">
      <label for="newSlideCode">Invoke Code</label>
      <input id="newSlideCode" class="code-field" placeholder="e.g. ROI" maxlength="6">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modalCancelBtn">Cancel</button>
      <button class="btn primary" id="modalAddBtn">Add</button>
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="videoModal">
  <div class="modal">
    <h3>Add Video</h3>
    <div class="field">
      <label for="videoUrlField">YouTube / Vimeo URL</label>
      <input id="videoUrlField" placeholder="https://youtube.com/watch?v=…">
    </div>
    <div class="modal-divider">— or upload a file —</div>
    <div style="display:flex;justify-content:center;margin-bottom:14px;">
      <button class="btn" id="videoFileBtn">Choose File…</button>
    </div>
    <div class="modal-actions">
      <button class="btn" id="videoCancelBtn">Cancel</button>
      <button class="btn primary" id="videoAddUrlBtn">Add URL</button>
    </div>
  </div>
</div>

<!-- FULLSCREEN PRESENTATION -->
<div class="fullscreen-overlay" id="fsOverlay">
  <div class="fs-canvas-wrapper" id="fsCanvasWrapper">
    <div class="slide-content" id="fsSlideContent"></div>
  </div>
  <input class="fs-code-input" id="fsCodeInput" placeholder="···" maxlength="6" spellcheck="false">
  <button class="fs-return-btn" id="fsReturnBtn">↩ Return to main</button>
  <div class="fs-indicator" id="fsIndicator">SLEEPER ACTIVE</div>
  <div class="fs-counter" id="fsCounter"></div>
  <div class="fs-anim-hint" id="fsAnimHint">Click to reveal next element</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="imageFileInput" accept="image/*" style="display:none">
<input type="file" id="videoFileInput" accept="video/*" style="display:none">

<!-- PRINT CONTAINER (PDF export) -->
<div id="printSlides"></div>

<script src="slides.js"></script>
<script src="app.js"></script>
</body>
</html>
